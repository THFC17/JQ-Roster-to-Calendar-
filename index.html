<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Roster to Calendar</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Geist+Mono:wght@400;500&family=Geist:wght@300;400;500;600&display=swap');
  :root {
    --bg:#fafafa; --surface:#fff; --surface2:#f4f4f5; --border:#e4e4e7;
    --border-focus:#a1a1aa; --text:#18181b; --muted:#71717a; --subtle:#a1a1aa;
    --blue:#2563eb; --blue-bg:#eff6ff; --green:#16a34a; --green-bg:#f0fdf4;
    --amber:#d97706; --purple:#7c3aed; --red:#dc2626; --red-bg:#fef2f2;
    --sans:'Geist',system-ui,sans-serif; --mono:'Geist Mono',monospace;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg:#0e0e10; --surface:#18181b; --surface2:#27272a; --border:#3f3f46;
      --border-focus:#71717a; --text:#fafafa; --muted:#a1a1aa; --subtle:#52525b;
      --blue:#60a5fa; --blue-bg:rgba(37,99,235,0.15); --green:#4ade80; --green-bg:rgba(22,163,74,0.15);
      --amber:#fbbf24; --purple:#c084fc; --red:#f87171; --red-bg:rgba(220,38,38,0.15);
    }
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh;
    display:flex;flex-direction:column;align-items:center;padding:56px 20px 80px;}
  .header{width:100%;max-width:520px;margin-bottom:36px;}
  .eyebrow{display:flex;align-items:center;gap:7px;margin-bottom:10px;}
  .eyebrow svg{color:var(--muted);}
  .eyebrow span{font-size:11.5px;font-weight:500;color:var(--muted);letter-spacing:.06em;text-transform:uppercase;}
  h1{font-size:26px;font-weight:600;letter-spacing:-.03em;line-height:1.1;}
  h1 span{color:var(--subtle);font-weight:300;}
  .wrap{width:100%;max-width:520px;display:flex;flex-direction:column;gap:10px;}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px 22px;transition:border-color .15s;}
  .card.active{border-color:var(--border-focus);}
  .card-hd{display:flex;align-items:center;gap:10px;margin-bottom:14px;}
  .step-num{width:22px;height:22px;border-radius:50%;background:var(--surface2);border:1px solid var(--border);
    display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:10px;
    font-weight:500;color:var(--muted);flex-shrink:0;transition:all .15s;}
  .card.active .step-num{background:var(--text);border-color:var(--text);color:#fff;}
  .card-title{font-size:13px;font-weight:500;}
  textarea{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:8px;
    color:var(--text);font-family:var(--mono);font-size:11.5px;padding:11px 13px;outline:none;
    resize:vertical;min-height:130px;line-height:1.6;transition:border-color .15s,background .15s;}
  textarea:focus{border-color:var(--border-focus);background:var(--surface);}
  textarea::placeholder{color:var(--subtle);}
  .hint{margin-top:7px;font-size:11px;color:var(--subtle);line-height:1.5;}
  .btn{width:100%;padding:11px 16px;border-radius:8px;border:none;font-family:var(--sans);font-size:13px;
    font-weight:500;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:7px;}
  .btn-dark{background:var(--text);color:#fff;}
  .btn-dark:hover:not(:disabled){background:#3f3f46;}
  .btn-dark:disabled{background:var(--border);color:var(--subtle);cursor:not-allowed;}
  .btn-green{background:var(--green);color:#fff;}
  .btn-green:hover{background:#15803d;}
  .status{display:none;padding:10px 13px;border-radius:7px;font-size:12.5px;line-height:1.5;margin-top:10px;}
  .status.error{display:block;background:var(--red-bg);border:1px solid #fecaca;color:var(--red);}
  .status.success{display:block;background:var(--green-bg);border:1px solid #bbf7d0;color:var(--green);}
  .results-card{display:none;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px 22px;}
  .results-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
  .results-title{font-size:13px;font-weight:500;}
  .count-pill{background:var(--surface2);border:1px solid var(--border);color:var(--muted);
    font-family:var(--mono);font-size:11px;font-weight:500;padding:2px 9px;border-radius:20px;}
  .legend{display:flex;gap:14px;flex-wrap:wrap;margin-bottom:14px;padding-bottom:14px;border-bottom:1px solid var(--border);}
  .legend-item{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--muted);}
  .dot{width:7px;height:7px;border-radius:2px;flex-shrink:0;}
  .dot-flight{background:var(--blue);} .dot-layover{background:var(--purple);}
  .dot-asb{background:var(--amber);} .dot-avl{background:var(--green);}
  .event-list{display:flex;flex-direction:column;}
  .event-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border);}
  .event-row:last-child{border-bottom:none;}
  .event-name{font-family:var(--mono);font-size:11.5px;flex:1;min-width:0;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .event-date-lbl{font-size:11px;color:var(--subtle);white-space:nowrap;flex-shrink:0;}
  .divider{height:1px;background:var(--border);margin:16px 0;}
</style>
</head>
<body>
<div class="header">
  <div class="eyebrow">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
      <path d="M22 2L11 13M22 2L15 22L11 13M22 2L2 9L11 13" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    <span>Jetstar Crew</span>
  </div>
  <h1>Roster <span>to Calendar</span></h1>
</div>

<div class="wrap">
  <div class="card active">
    <div class="card-hd">
      <div class="step-num">1</div>
      <div class="card-title">Paste roster from roc.jetstar.com</div>
    </div>
    <textarea id="rosterText" placeholder="Select all rows in the roster table, copy, then paste here…" oninput="checkReady()"></textarea>
    <div class="hint">Open your roster → select the table → Ctrl+C / Cmd+C → paste above</div>
  </div>

  <div class="card" id="step2card">
    <div class="card-hd">
      <div class="step-num">2</div>
      <div class="card-title">Build calendar file</div>
    </div>
    <button class="btn btn-dark" id="processBtn" onclick="processRoster()" disabled>
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="10"/><polygon points="10 8 16 12 10 16 10 8" fill="currentColor" stroke="none"/>
      </svg>
      Build Calendar
    </button>
    <div class="status" id="status"></div>
  </div>

  <div class="results-card" id="resultsCard">
    <div class="results-hd">
      <div class="results-title">Events</div>
      <div class="count-pill" id="countBadge">0</div>
    </div>
    <div class="legend">
      <div class="legend-item"><span class="dot dot-flight"></span>Flight</div>
      <div class="legend-item"><span class="dot dot-layover"></span>Layover</div>
      <div class="legend-item"><span class="dot dot-asb"></span>ASB</div>
      <div class="legend-item"><span class="dot dot-avl"></span>On Call</div>
    </div>
    <div class="event-list" id="eventsPreview"></div>
    <div class="divider"></div>
    <button class="btn btn-green" onclick="downloadICS()">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M7 10l5 5 5-5M12 15V3" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      Download .ICS
    </button>
  </div>
</div>

<script>
let parsedEvents = [];

function checkReady() {
  const has = document.getElementById('rosterText').value.trim().length > 10;
  document.getElementById('processBtn').disabled = !has;
  document.getElementById('step2card').classList.toggle('active', has);
}

// ── Helpers ───────────────────────────────────────────────────
const MO = {JAN:0,FEB:1,MAR:2,APR:3,MAY:4,JUN:5,JUL:6,AUG:7,SEP:8,OCT:9,NOV:10,DEC:11};
const DT_RE = /^\d{2}[A-Z]{3}\d{2}\s+\d{2}:\d{2}$/i;
const ACT_RE = /^(BLN|OFA|WVL|ASB|AVL|HTL|PCK|JQ\d+)$/i;

function isDT(s)  { return DT_RE.test((s||'').trim()); }
function isAct(s) { return ACT_RE.test((s||'').trim()); }

function parseDT(s) {
  if (!isDT((s||'').trim())) return null;
  s = s.trim();
  const m = s.match(/^(\d{2})([A-Z]{3})(\d{2})\s+(\d{2}):(\d{2})$/i);
  return m ? new Date(2000+parseInt(m[3]), MO[m[2].toUpperCase()], parseInt(m[1]), parseInt(m[4]), parseInt(m[5])) : null;
}

function rd5(dt) {
  if (!dt) return dt;
  const d = new Date(dt);
  d.setMinutes(Math.floor(d.getMinutes()/5)*5, 0, 0);
  return d;
}

function ru5(dt) {
  if (!dt) return dt;
  const d = new Date(dt);
  const m = d.getMinutes();
  if (m%5 !== 0) d.setMinutes(Math.ceil(m/5)*5, 0, 0);
  if (d.getMinutes()===0 && m>0) {} // setMinutes handles rollover
  return d;
}

function ft(dt) {
  if (!dt) return '';
  return `${String(dt.getHours()).padStart(2,'0')}:${String(dt.getMinutes()).padStart(2,'0')}`;
}

function d2ics(dt) {
  return `${dt.getFullYear()}${String(dt.getMonth()+1).padStart(2,'0')}${String(dt.getDate()).padStart(2,'0')}`;
}

function dayOnly(dt) { return new Date(dt.getFullYear(), dt.getMonth(), dt.getDate()); }
function addDays(dt,n) { const d=new Date(dt); d.setDate(d.getDate()+n); return d; }

// ── Row parser ────────────────────────────────────────────────
// Four column layouts observed in Jetstar roster paste:
// A: ""  | ""  | ACT | datetime | dep | arr | end | checkout  (two leading empty cols)
// B: ""  | DT  | ACT | datetime | dep | arr | end | checkout  (checkin in col1)
// C: ACT | DT  | dep | arr      | end | checkout              (no checkin col)
// D: DT  | ACT | DT  | dep      | arr | end  | checkout       (checkin in col0, e.g. ASB/AVL/layover return)

function parseRow(cols) {
  const c = cols.map(x => (x||'').trim());
  let activity, start, dep, arr, end, checkout;

  if (isDT(c[0]) && isAct(c[1])) {
    // Layout D
    activity=c[1]; start=parseDT(c[2]); dep=c[3]; arr=c[4]; end=parseDT(c[5]); checkout=parseDT(c[6]);
  } else if (isAct(c[0]) && isDT(c[1])) {
    // Layout C
    activity=c[0]; start=parseDT(c[1]); dep=c[2]; arr=c[3]; end=parseDT(c[4]); checkout=parseDT(c[5]);
  } else if (c[0]==='' && isDT(c[1]) && isAct(c[2])) {
    // Layout B
    activity=c[2]; start=parseDT(c[3]); dep=c[4]; arr=c[5]; end=parseDT(c[6]); checkout=parseDT(c[7]);
  } else if (c[0]==='' && c[1]==='' && isAct(c[2])) {
    // Layout A
    activity=c[2]; start=parseDT(c[3]); dep=c[4]; arr=c[5]; end=parseDT(c[6]); checkout=parseDT(c[7]);
  } else {
    return null;
  }

  if (!activity) return null;
  return { activity: activity.toUpperCase(), start, dep: (dep||'').toUpperCase(), arr: (arr||'').toUpperCase(), end, checkout };
}

// ── Event builder ─────────────────────────────────────────────
const SKIP = ['BLN','OFA','WVL','PCK','HTL'];
const HOME = 'ADL';

function buildEvents(rows) {
  const events = [];
  let i = 0;

  while (i < rows.length) {
    const row = rows[i];
    const act = row.activity;

    if (SKIP.includes(act)) { i++; continue; }

    if (act.startsWith('JQ')) {
      // ── Scan ahead for this duty sequence ──
      // Rules:
      // - PCK and HTL within the sequence = layover, keep scanning
      // - BLN or OFA = day-off gap, stop immediately (breaks the chain)
      // - WVL = pre-duty row on same day, stop (next JQ is a new duty)
      // - ASB / AVL = different duty type, stop
      // - Another JQ on the same or next calendar day without a gap = same sequence
      let seqEnd = i;
      let hasLayover = false;

      let j = i + 1;
      while (j < rows.length) {
        const a = rows[j].activity;
        if (a === 'HTL' || a === 'PCK') { hasLayover = true; j++; continue; }
        // BLN / OFA = rest day gap — only allowed AFTER a layover HTL has been seen
        if (a === 'BLN' || a === 'OFA' || a === 'WVL') {
          if (!hasLayover) break; // gap before any HTL = new duty, stop
          j++; continue;         // gap after HTL = still part of layover return travel
        }
        if (a.startsWith('JQ')) { seqEnd = j; j++; continue; }
        break; // ASB, AVL, or anything else
      }

      // Collect all JQ flights in i..seqEnd range
      const seqFlights = [];
      for (let k = i; k <= seqEnd; k++) {
        if (rows[k].activity.startsWith('JQ')) seqFlights.push(rows[k]);
      }

      if (hasLayover) {
        // Single spanning all-day event across all dates
        const first = seqFlights[0];
        const last  = seqFlights[seqFlights.length - 1];
        const s = rd5(first.start);
        const e = ru5(last.checkout || last.end);

        // All non-ADL destinations across entire layover
        const destinations = [];
        for (const f of seqFlights) {
          for (const ap of [f.dep, f.arr]) {
            if (ap && ap.toUpperCase() !== HOME && !destinations.includes(ap.toUpperCase()))
              destinations.push(ap.toUpperCase());
          }
        }
        const destStr = destinations.length ? destinations.join('/') : first.dep;

        events.push({
          type: 'layover',
          title: `Alana Work (${destStr}: ${ft(s)} - ${ft(e)})`,
          startDate: dayOnly(s),
          endDate: addDays(dayOnly(e), 1)
        });
        i = seqEnd + 1;
        continue;
      }

      // ── No layover: group by duty day (calendar date of first flight) ──
      // seqFlights are all same-chain; split by calendar date
      const byDate = {};
      for (const f of seqFlights) {
        const dk = d2ics(dayOnly(f.start));
        if (!byDate[dk]) byDate[dk] = [];
        byDate[dk].push(f);
      }

      for (const dk of Object.keys(byDate).sort()) {
        const flights = byDate[dk];
        let earliestStart = null;
        let latestEnd = null;
        const destinations = [];

        for (const f of flights) {
          const s = rd5(f.start);
          const e = ru5(f.checkout || f.end);
          if (!earliestStart || s < earliestStart) earliestStart = s;
          if (!latestEnd || e > latestEnd) latestEnd = e;
          for (const ap of [f.dep, f.arr]) {
            if (ap && ap.toUpperCase() !== HOME && !destinations.includes(ap.toUpperCase()))
              destinations.push(ap.toUpperCase());
          }
        }

        const destStr = destinations.length ? destinations.join('/') : flights[0].dep;
        events.push({
          type: 'flight',
          title: `Alana Work (${destStr}: ${ft(earliestStart)} - ${ft(latestEnd)})`,
          startDate: dayOnly(earliestStart),
          endDate: addDays(dayOnly(latestEnd), 1)
        });
      }

      i = seqEnd + 1;
      continue;
    }

    if (act === 'ASB') {
      const s = rd5(row.start);
      const e = ru5(row.checkout || row.end);
      events.push({
        type:'asb',
        title:`Alana ASB (${ft(s)} - ${ft(e)})`,
        startDate: dayOnly(s),
        endDate: addDays(dayOnly(s), 1)
      });
      i++; continue;
    }

    if (act === 'AVL') {
      const s = rd5(row.start);
      const e = ru5(row.checkout || row.end);
      events.push({
        type:'avl',
        title:`Alana On Call (${ft(s)} - ${ft(e)})`,
        startDate: dayOnly(s),
        endDate: addDays(dayOnly(s), 1)
      });
      i++; continue;
    }

    i++;
  }
  return events;
}

// ── Process ───────────────────────────────────────────────────
function processRoster() {
  const raw = document.getElementById('rosterText').value;
  const statusEl = document.getElementById('status');

  try {
    const lines = raw.split('\n').map(l => l.replace(/\r/g,''));
    const rows = [];
    for (const line of lines) {
      if (!line.trim()) continue;
      const cols = line.split('\t');
      if ((cols[0]||'').trim() === 'Checkin') continue; // header
      const row = parseRow(cols);
      if (row) rows.push(row);
    }

    if (!rows.length) throw new Error('No rows found. Make sure you copied the full table including all columns.');

    parsedEvents = buildEvents(rows);
    if (!parsedEvents.length) throw new Error('No schedulable events found after filtering.');

    renderPreview(parsedEvents);
    document.getElementById('countBadge').textContent = parsedEvents.length;
    document.getElementById('resultsCard').style.display = 'block';
    statusEl.className = 'status success';
    statusEl.textContent = `${parsedEvents.length} events ready. Review then download.`;

  } catch(e) {
    statusEl.className = 'status error';
    statusEl.textContent = 'Error: ' + e.message;
    document.getElementById('resultsCard').style.display = 'none';
  }
}

// ── Render ────────────────────────────────────────────────────
const DOT_MAP = {flight:'dot-flight',layover:'dot-layover',asb:'dot-asb',avl:'dot-avl'};

function renderPreview(events) {
  const container = document.getElementById('eventsPreview');
  container.innerHTML = '';
  events.forEach(ev => {
    const dispEnd = new Date(ev.endDate); dispEnd.setDate(dispEnd.getDate()-1);
    const s = ev.startDate.toLocaleDateString('en-AU',{day:'numeric',month:'short'});
    const e = dispEnd.toLocaleDateString('en-AU',{day:'numeric',month:'short'});
    const lbl = s===e ? s : `${s} – ${e}`;
    const row = document.createElement('div');
    row.className = 'event-row';
    row.innerHTML = `<span class="dot ${DOT_MAP[ev.type]||'dot-flight'}"></span>
      <span class="event-name">${ev.title}</span>
      <span class="event-date-lbl">${lbl}</span>`;
    container.appendChild(row);
  });
}

// ── ICS download ──────────────────────────────────────────────
function escICS(s) { return s.replace(/[\\;,]/g,c=>'\\'+c).replace(/\n/g,'\\n'); }
function uid()     { return Math.random().toString(36).slice(2)+Date.now().toString(36)+'@roster'; }

function downloadICS() {
  if (!parsedEvents.length) return;
  const lines = ['BEGIN:VCALENDAR','VERSION:2.0','PRODID:-//Roster to Calendar//EN','CALSCALE:GREGORIAN','METHOD:PUBLISH'];
  parsedEvents.forEach(ev => {
    lines.push('BEGIN:VEVENT');
    lines.push('UID:'+uid());
    lines.push('DTSTAMP:'+new Date().toISOString().replace(/[-:]/g,'').split('.')[0]+'Z');
    lines.push('DTSTART;VALUE=DATE:'+d2ics(ev.startDate));
    lines.push('DTEND;VALUE=DATE:'+d2ics(ev.endDate));
    lines.push('SUMMARY:'+escICS(ev.title));
    lines.push('TRANSP:TRANSPARENT');
    lines.push('END:VEVENT');
  });
  lines.push('END:VCALENDAR');
  const blob = new Blob([lines.join('\r\n')],{type:'text/calendar;charset=utf-8'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href=url; a.download='alana-roster.ics'; a.click();
  URL.revokeObjectURL(url);
}
</script>
</body>
</html>
