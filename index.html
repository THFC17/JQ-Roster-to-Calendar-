<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Roster to Calendar</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Geist+Mono:wght@400;500&family=Geist:wght@300;400;500;600&display=swap');

  :root {
    --bg: #fafafa;
    --surface: #ffffff;
    --surface2: #f4f4f5;
    --border: #e4e4e7;
    --border-focus: #a1a1aa;
    --accent: #18181b;
    --accent-light: #3f3f46;
    --blue: #2563eb;
    --blue-bg: #eff6ff;
    --green: #16a34a;
    --green-bg: #f0fdf4;
    --amber: #d97706;
    --amber-bg: #fffbeb;
    --purple: #7c3aed;
    --red: #dc2626;
    --red-bg: #fef2f2;
    --text: #18181b;
    --muted: #71717a;
    --subtle: #a1a1aa;
    --sans: 'Geist', system-ui, sans-serif;
    --mono: 'Geist Mono', monospace;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 56px 20px 80px;
  }

  /* Header */
  .header {
    width: 100%;
    max-width: 480px;
    margin-bottom: 40px;
  }

  .header-eyebrow {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 10px;
  }

  .plane-icon {
    width: 18px;
    height: 18px;
    color: var(--muted);
  }

  .header-eyebrow span {
    font-size: 12px;
    font-weight: 500;
    color: var(--muted);
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }

  .header h1 {
    font-size: 26px;
    font-weight: 600;
    color: var(--text);
    letter-spacing: -0.03em;
    line-height: 1.1;
  }

  .header h1 span {
    color: var(--subtle);
    font-weight: 300;
  }

  /* Steps */
  .steps {
    width: 100%;
    max-width: 480px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .step {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px 22px;
    transition: border-color 0.15s;
  }

  .step.active {
    border-color: var(--border-focus);
  }

  .step-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 14px;
  }

  .step-num {
    width: 22px;
    height: 22px;
    border-radius: 50%;
    background: var(--surface2);
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 500;
    color: var(--muted);
    flex-shrink: 0;
  }

  .step.active .step-num {
    background: var(--text);
    border-color: var(--text);
    color: #fff;
  }

  .step-title {
    font-size: 13px;
    font-weight: 500;
    color: var(--text);
  }

  /* Drop zone */
  .drop-zone {
    position: relative;
    border: 1.5px dashed var(--border);
    border-radius: 8px;
    padding: 28px 20px;
    text-align: center;
    cursor: pointer;
    transition: all 0.15s;
    background: var(--surface2);
  }

  .drop-zone:hover, .drop-zone.drag-over {
    border-color: var(--border-focus);
    background: #f0f0f1;
  }

  .drop-zone input[type="file"] {
    position: absolute;
    inset: 0;
    opacity: 0;
    cursor: pointer;
    width: 100%;
    height: 100%;
  }

  .upload-icon {
    width: 28px;
    height: 28px;
    margin: 0 auto 8px;
    color: var(--subtle);
  }

  .drop-zone p {
    font-size: 13px;
    color: var(--muted);
    line-height: 1.5;
  }

  .drop-zone strong {
    color: var(--text);
    font-weight: 500;
  }

  .preview-wrap {
    margin-top: 12px;
    border-radius: 6px;
    overflow: hidden;
    display: none;
    border: 1px solid var(--border);
  }

  .preview-wrap img {
    width: 100%;
    display: block;
    max-height: 160px;
    object-fit: cover;
    object-position: top;
  }

  .file-pill {
    display: none;
    align-items: center;
    gap: 8px;
    margin-top: 10px;
    background: var(--green-bg);
    border: 1px solid #bbf7d0;
    border-radius: 6px;
    padding: 7px 11px;
    font-size: 12px;
    color: var(--green);
    font-weight: 500;
  }

  /* API key */
  .input-row {
    display: flex;
    gap: 8px;
  }

  .input-row input {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: var(--mono);
    font-size: 12px;
    padding: 9px 12px;
    outline: none;
    transition: border-color 0.15s, background 0.15s;
  }

  .input-row input:focus {
    border-color: var(--border-focus);
    background: var(--surface);
  }

  .input-row input::placeholder {
    color: var(--subtle);
  }

  .btn-ghost {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--muted);
    cursor: pointer;
    padding: 9px 12px;
    font-size: 11px;
    font-weight: 500;
    transition: all 0.15s;
    white-space: nowrap;
    font-family: var(--mono);
    letter-spacing: 0.02em;
  }

  .btn-ghost:hover {
    border-color: var(--border-focus);
    color: var(--text);
  }

  .key-hint {
    margin-top: 7px;
    font-size: 11px;
    color: var(--subtle);
  }

  .key-hint a {
    color: var(--blue);
    text-decoration: none;
  }

  /* Buttons */
  .btn {
    width: 100%;
    padding: 11px 16px;
    border-radius: 8px;
    border: none;
    font-family: var(--sans);
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: -0.01em;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 7px;
  }

  .btn-dark {
    background: var(--text);
    color: #fff;
  }

  .btn-dark:hover:not(:disabled) {
    background: var(--accent-light);
  }

  .btn-dark:disabled {
    background: var(--border);
    color: var(--subtle);
    cursor: not-allowed;
  }

  .btn-green {
    background: var(--green);
    color: #fff;
  }

  .btn-green:hover {
    background: #15803d;
  }

  /* Status */
  .status {
    display: none;
    padding: 10px 13px;
    border-radius: 7px;
    font-size: 12.5px;
    line-height: 1.5;
    margin-top: 10px;
  }

  .status.loading {
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--blue-bg);
    border: 1px solid #bfdbfe;
    color: var(--blue);
  }

  .status.error {
    display: block;
    background: var(--red-bg);
    border: 1px solid #fecaca;
    color: var(--red);
  }

  .status.success {
    display: block;
    background: var(--green-bg);
    border: 1px solid #bbf7d0;
    color: var(--green);
  }

  .spinner {
    width: 14px;
    height: 14px;
    border: 1.5px solid #bfdbfe;
    border-top-color: var(--blue);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    flex-shrink: 0;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* Results */
  .results-card {
    display: none;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px 22px;
    width: 100%;
    max-width: 480px;
    margin-top: 10px;
  }

  .results-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
  }

  .results-title {
    font-size: 13px;
    font-weight: 500;
    color: var(--text);
  }

  .count-pill {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 500;
    padding: 2px 9px;
    border-radius: 20px;
  }

  .legend {
    display: flex;
    gap: 14px;
    flex-wrap: wrap;
    margin-bottom: 14px;
    padding-bottom: 14px;
    border-bottom: 1px solid var(--border);
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 11px;
    color: var(--muted);
  }

  .dot {
    width: 7px;
    height: 7px;
    border-radius: 2px;
    flex-shrink: 0;
  }

  .dot-flight { background: var(--blue); }
  .dot-asb { background: var(--amber); }
  .dot-avl { background: var(--green); }
  .dot-layover { background: var(--purple); }

  .event-list {
    display: flex;
    flex-direction: column;
    gap: 1px;
  }

  .event-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 0;
    border-bottom: 1px solid var(--border);
  }

  .event-row:last-child { border-bottom: none; }

  .event-name {
    font-family: var(--mono);
    font-size: 11.5px;
    color: var(--text);
    flex: 1;
    min-width: 0;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .event-date-label {
    font-size: 11px;
    color: var(--subtle);
    white-space: nowrap;
    flex-shrink: 0;
  }

  .divider {
    height: 1px;
    background: var(--border);
    margin: 16px 0;
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-eyebrow">
    <svg class="plane-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
      <path d="M22 2L11 13M22 2L15 22L11 13M22 2L2 9L11 13" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    <span>Jetstar Crew</span>
  </div>
  <h1>Roster <span>to Calendar</span></h1>
</div>

<div class="steps">

  <!-- Step 1 -->
  <div class="step active" id="step1">
    <div class="step-header">
      <div class="step-num">1</div>
      <div class="step-title">Upload roster screenshot</div>
    </div>
    <div class="drop-zone" id="dropZone">
      <input type="file" id="fileInput" accept="image/*">
      <svg class="upload-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1M16 7l-4-4-4 4M12 3v13" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <p><strong>Click to upload</strong> or drag and drop<br>PNG · JPG · HEIC</p>
    </div>
    <div class="preview-wrap" id="previewWrap">
      <img id="previewImg" src="" alt="">
    </div>
    <div class="file-pill" id="filePill">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>
      <span id="fileName">Image loaded</span>
    </div>
  </div>

  <!-- Step 2 -->
  <div class="step" id="step2">
    <div class="step-header">
      <div class="step-num">2</div>
      <div class="step-title">Anthropic API key</div>
    </div>
    <div class="input-row">
      <input type="password" id="apiKey" placeholder="sk-ant-api03-…" autocomplete="off">
      <button class="btn-ghost" onclick="toggleKey()">Show</button>
    </div>
    <div class="key-hint">Get a key at <a href="https://console.anthropic.com" target="_blank">console.anthropic.com</a></div>
  </div>

  <!-- Step 3 -->
  <div class="step" id="step3">
    <div class="step-header">
      <div class="step-num">3</div>
      <div class="step-title">Parse and download</div>
    </div>
    <button class="btn btn-dark" id="processBtn" onclick="processRoster()" disabled>
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polygon points="10 8 16 12 10 16 10 8" fill="currentColor" stroke="none"/></svg>
      Parse Roster
    </button>
    <div class="status" id="status"></div>
  </div>

</div>

<!-- Results -->
<div class="results-card" id="resultsCard">
  <div class="results-header">
    <div class="results-title">Events</div>
    <div class="count-pill" id="countBadge">0</div>
  </div>
  <div class="legend">
    <div class="legend-item"><span class="dot dot-flight"></span>Flight</div>
    <div class="legend-item"><span class="dot dot-layover"></span>Layover</div>
    <div class="legend-item"><span class="dot dot-asb"></span>ASB</div>
    <div class="legend-item"><span class="dot dot-avl"></span>On Call</div>
  </div>
  <div class="event-list" id="eventsPreview"></div>
  <div class="divider"></div>
  <button class="btn btn-green" onclick="downloadICS()">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M7 10l5 5 5-5M12 15V3" stroke-linecap="round" stroke-linejoin="round"/></svg>
    Download .ICS
  </button>
</div>

<script>
let imageBase64 = null;
let imageType = null;
let parsedEvents = [];

const dropZone = document.getElementById('dropZone');
const fileInput = document.getElementById('fileInput');

dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.classList.remove('drag-over');
  if (e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]);
});
fileInput.addEventListener('change', e => { if (e.target.files[0]) handleFile(e.target.files[0]); });

function handleFile(file) {
  const reader = new FileReader();
  reader.onload = ev => {
    const result = ev.target.result;
    imageBase64 = result.split(',')[1];
    imageType = file.type || 'image/jpeg';
    document.getElementById('previewImg').src = result;
    document.getElementById('previewWrap').style.display = 'block';
    const pill = document.getElementById('filePill');
    document.getElementById('fileName').textContent = file.name;
    pill.style.display = 'flex';
    document.getElementById('step1').classList.add('active');
    document.getElementById('step2').classList.add('active');
    checkReady();
  };
  reader.readAsDataURL(file);
}

document.getElementById('apiKey').addEventListener('input', checkReady);

function checkReady() {
  const key = document.getElementById('apiKey').value.trim();
  const ready = !!(imageBase64 && key);
  document.getElementById('processBtn').disabled = !ready;
  if (ready) document.getElementById('step3').classList.add('active');
}

function toggleKey() {
  const input = document.getElementById('apiKey');
  const btn = document.querySelector('.btn-ghost');
  input.type = input.type === 'password' ? 'text' : 'password';
  btn.textContent = input.type === 'password' ? 'Show' : 'Hide';
}

function setStatus(type, msg) {
  const el = document.getElementById('status');
  el.className = 'status ' + type;
  el.innerHTML = type === 'loading'
    ? `<div class="spinner"></div><span>${msg}</span>`
    : msg;
}

function roundDown5(t) {
  if (!t || !t.includes(':')) return t;
  let [h, m] = t.split(':').map(Number);
  m = Math.floor(m / 5) * 5;
  return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`;
}

function roundUp5(t) {
  if (!t || !t.includes(':')) return t;
  let [h, m] = t.split(':').map(Number);
  if (m % 5 !== 0) m = Math.ceil(m / 5) * 5;
  if (m >= 60) { m = 0; h += 1; }
  if (h >= 24) { h = 23; m = 55; }
  return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`;
}

async function processRoster() {
  const apiKey = document.getElementById('apiKey').value.trim();
  if (!imageBase64 || !apiKey) return;

  document.getElementById('processBtn').disabled = true;
  setStatus('loading', 'Reading roster…');
  document.getElementById('resultsCard').style.display = 'none';

  const prompt = `Parse this Jetstar crew roster screenshot. Return ONLY a raw JSON array — no markdown, no explanation, no backticks.

For each row extract:
{
  "date": "DDMMMYY" from Start column e.g. "03JUN26",
  "activity": full activity code e.g. "JQ966", "BLN", "OFA", "WVL", "ASB", "AVL", "HTL", "PCK",
  "dep": departure airport 2-3 chars,
  "arr": arrival airport 2-3 chars,
  "startTime": "HH:MM" time part from Start column,
  "endTime": "HH:MM" time part from End column,
  "checkoutTime": "HH:MM" from Checkout column if present else null,
  "checkoutDate": "DDMMMYY" from Checkout column date if present else null,
  "endDate": "DDMMMYY" from End column date if different from start date else null
}

Return every single row without exception. Raw JSON array only.`;

  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 4000,
        messages: [{ role: 'user', content: [
          { type: 'image', source: { type: 'base64', media_type: imageType, data: imageBase64 }},
          { type: 'text', text: prompt }
        ]}]
      })
    });

    if (!response.ok) {
      const err = await response.json();
      throw new Error(err.error?.message || 'API error ' + response.status);
    }

    const data = await response.json();
    const raw = data.content.map(b => b.text || '').join('');
    const clean = raw.replace(/```json|```/g, '').trim();
    const rows = JSON.parse(clean);

    setStatus('loading', 'Building events…');
    parsedEvents = buildEvents(rows);

    renderPreview(parsedEvents);
    document.getElementById('countBadge').textContent = parsedEvents.length;
    document.getElementById('resultsCard').style.display = 'block';
    setStatus('success', `${parsedEvents.length} events ready. Review then download.`);

  } catch(e) {
    setStatus('error', 'Error: ' + e.message);
    document.getElementById('processBtn').disabled = false;
  }
}

function parseRosterDate(s) {
  if (!s) return null;
  const mo = {JAN:0,FEB:1,MAR:2,APR:3,MAY:4,JUN:5,JUL:6,AUG:7,SEP:8,OCT:9,NOV:10,DEC:11};
  const d = parseInt(s.substring(0,2));
  const m = s.substring(2,5).toUpperCase();
  const y = 2000 + parseInt(s.substring(5,7));
  return new Date(y, mo[m], d);
}

function dateToICS(d) {
  return `${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}`;
}

function addDays(date, n) {
  const d = new Date(date); d.setDate(d.getDate() + n); return d;
}

function buildEvents(rows) {
  const skip = ['BLN','OFA','WVL','PCK','HTL'];
  const events = [];
  let i = 0;

  while (i < rows.length) {
    const row = rows[i];
    const act = (row.activity || '').toUpperCase().trim();

    if (skip.some(s => act === s || act.startsWith(s))) { i++; continue; }

    if (act.startsWith('JQ')) {
      let isLayoverStart = false;
      let layoverEnd = -1;

      for (let j = i + 1; j < rows.length; j++) {
        const a = (rows[j].activity || '').toUpperCase().trim();
        if (a === 'HTL' || a === 'PCK') isLayoverStart = true;
        if (isLayoverStart && a.startsWith('JQ') && j > i + 1) {
          let hasMoreHTL = false;
          for (let k = j + 1; k < rows.length; k++) {
            const ak = (rows[k].activity || '').toUpperCase().trim();
            if (ak === 'HTL') { hasMoreHTL = true; break; }
            if (ak.startsWith('JQ')) break;
            if (!['BLN','OFA','WVL','PCK','HTL','ASB','AVL'].includes(ak)) break;
          }
          if (!hasMoreHTL) { layoverEnd = j; break; }
        }
        if (!isLayoverStart && ['ASB','AVL'].includes(a)) break;
        if (!isLayoverStart && a.startsWith('JQ') && j > i) break;
      }

      if (isLayoverStart && layoverEnd !== -1) {
        const lastRow = rows[layoverEnd];
        const startDate = parseRosterDate(row.date);
        const endDate = parseRosterDate(lastRow.checkoutDate || lastRow.endDate || lastRow.date);
        events.push({
          type: 'layover',
          title: `Alana Work (${row.dep}: ${roundDown5(row.startTime)} - ${roundUp5(lastRow.checkoutTime || lastRow.endTime)})`,
          startDate,
          endDate: addDays(endDate, 1)
        });
        i = layoverEnd + 1;
        continue;
      }

      const startDate = parseRosterDate(row.date);
      const endDate = parseRosterDate(row.checkoutDate || row.endDate || row.date);
      events.push({
        type: 'flight',
        title: `Alana Work (${row.dep}: ${roundDown5(row.startTime)} - ${roundUp5(row.checkoutTime || row.endTime)})`,
        startDate,
        endDate: addDays(endDate, 1)
      });
      i++; continue;
    }

    if (act === 'ASB') {
      const startDate = parseRosterDate(row.date);
      events.push({
        type: 'asb',
        title: `Alana ASB (${roundDown5(row.startTime)} - ${roundUp5(row.checkoutTime || row.endTime)})`,
        startDate,
        endDate: addDays(startDate, 1)
      });
      i++; continue;
    }

    if (act === 'AVL') {
      const startDate = parseRosterDate(row.date);
      events.push({
        type: 'avl',
        title: `Alana On Call (${roundDown5(row.startTime)} - ${roundUp5(row.checkoutTime || row.endTime)})`,
        startDate,
        endDate: addDays(startDate, 1)
      });
      i++; continue;
    }

    i++;
  }
  return events;
}

function renderPreview(events) {
  const container = document.getElementById('eventsPreview');
  container.innerHTML = '';
  const dotMap = { flight:'dot-flight', layover:'dot-layover', asb:'dot-asb', avl:'dot-avl' };

  events.forEach(ev => {
    const displayEnd = new Date(ev.endDate);
    displayEnd.setDate(displayEnd.getDate() - 1);
    const s = ev.startDate.toLocaleDateString('en-AU', { day:'numeric', month:'short' });
    const e = displayEnd.toLocaleDateString('en-AU', { day:'numeric', month:'short' });
    const dateLabel = s === e ? s : `${s} – ${e}`;

    const row = document.createElement('div');
    row.className = 'event-row';
    row.innerHTML = `
      <span class="dot ${dotMap[ev.type] || 'dot-flight'}"></span>
      <span class="event-name">${ev.title}</span>
      <span class="event-date-label">${dateLabel}</span>`;
    container.appendChild(row);
  });
}

function escICS(s) { return s.replace(/[\\;,]/g, c => '\\' + c).replace(/\n/g,'\\n'); }
function uid() { return Math.random().toString(36).slice(2) + Date.now().toString(36) + '@roster'; }

function downloadICS() {
  if (!parsedEvents.length) return;
  const lines = ['BEGIN:VCALENDAR','VERSION:2.0','PRODID:-//Roster to Calendar//EN','CALSCALE:GREGORIAN','METHOD:PUBLISH'];
  parsedEvents.forEach(ev => {
    lines.push('BEGIN:VEVENT');
    lines.push('UID:' + uid());
    lines.push('DTSTAMP:' + new Date().toISOString().replace(/[-:]/g,'').split('.')[0] + 'Z');
    lines.push('DTSTART;VALUE=DATE:' + dateToICS(ev.startDate));
    lines.push('DTEND;VALUE=DATE:' + dateToICS(ev.endDate));
    lines.push('SUMMARY:' + escICS(ev.title));
    lines.push('TRANSP:TRANSPARENT');
    lines.push('END:VEVENT');
  });
  lines.push('END:VCALENDAR');
  const blob = new Blob([lines.join('\r\n')], { type:'text/calendar;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'alana-roster.ics'; a.click();
  URL.revokeObjectURL(url);
}
</script>
